<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Order - Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1a1a1a;
        }

        .container {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 400;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #888;
            font-size: 0.85rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-card {
            border-top: 1px solid #e5e5e5;
            border-bottom: 1px solid #e5e5e5;
            padding: 40px 0;
            margin-bottom: 40px;
            text-align: center;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1a1a1a;
        }

        .status-text {
            font-size: 1rem;
            font-weight: 400;
            color: #1a1a1a;
            letter-spacing: 0.5px;
        }

        .status-message {
            font-size: 0.9rem;
            color: #666;
            margin-top: 8px;
            font-weight: 300;
        }

        .info-grid {
            display: grid;
            gap: 1px;
            margin-top: 30px;
            background: #e5e5e5;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            background: #ffffff;
        }

        .info-label {
            font-weight: 400;
            color: #888;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-weight: 400;
            color: #1a1a1a;
            font-size: 0.9rem;
        }

        .refresh-btn {
            width: 100%;
            padding: 12px;
            background: #ffffff;
            color: #1a1a1a;
            border: 1px solid #1a1a1a;
            font-size: 0.85rem;
            font-weight: 400;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .refresh-btn:hover {
            background: #1a1a1a;
            color: #ffffff;
        }

        .refresh-btn:active {
            opacity: 0.8;
        }

        .refresh-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .loading {
            opacity: 0.5;
        }

        .error .status-dot {
            background: #666;
        }

        .timestamp {
            font-size: 0.75rem;
            color: #999;
            margin-top: 12px;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">EZ Order</div>
            <div class="subtitle">Backend Status Monitor</div>
        </div>

        <div class="status-card" id="statusCard">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <div class="status-text" id="statusText">Checking...</div>
            </div>
            <div class="status-message" id="statusMessage">Verifying connection...</div>
            <div class="timestamp" id="timestamp"></div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">API Status</span>
                <span class="info-value" id="apiStatus">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Database</span>
                <span class="info-value" id="databaseStatus">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Response Time</span>
                <span class="info-value" id="responseTime">-</span>
            </div>
        </div>

        <button class="refresh-btn" id="refreshBtn" onclick="checkStatus()">
            Refresh Status
        </button>
    </div>

    <script>
        async function checkStatus() {
            const statusCard = document.getElementById('statusCard');
            const statusText = document.getElementById('statusText');
            const statusMessage = document.getElementById('statusMessage');
            const timestamp = document.getElementById('timestamp');
            const apiStatus = document.getElementById('apiStatus');
            const databaseStatus = document.getElementById('databaseStatus');
            const responseTime = document.getElementById('responseTime');
            const refreshBtn = document.getElementById('refreshBtn');

            // Reset UI
            statusCard.classList.remove('error', 'loading');
            statusCard.classList.add('loading');
            refreshBtn.disabled = true;
            refreshBtn.textContent = 'Checking...';

            const startTime = performance.now();

            try {
                const response = await fetch('/api/health');
                const endTime = performance.now();
                const responseTimeMs = Math.round(endTime - startTime);

                statusCard.classList.remove('loading');

                if (response.ok) {
                    const data = await response.json();
                    
                    // Success state
                    statusCard.classList.remove('error');
                    statusText.textContent = 'Online';
                    statusMessage.textContent = data.message || 'All systems operational';
                    timestamp.textContent = `Last checked: ${new Date(data.timestamp).toLocaleString()}`;
                    
                    apiStatus.textContent = 'Operational';
                    databaseStatus.textContent = 'Connected';
                    responseTime.textContent = `${responseTimeMs}ms`;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                // Error state
                statusCard.classList.remove('loading');
                statusCard.classList.add('error');
                statusText.textContent = 'Offline';
                statusMessage.textContent = error.message || 'Unable to connect to server';
                timestamp.textContent = `Error at: ${new Date().toLocaleString()}`;
                
                apiStatus.textContent = 'Unavailable';
                databaseStatus.textContent = 'Disconnected';
                responseTime.textContent = '-';
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = 'Refresh Status';
            }
        }

        // Check status on page load
        checkStatus();

        // Auto-refresh every 30 seconds
        setInterval(checkStatus, 30000);
    </script>
</body>
</html>
